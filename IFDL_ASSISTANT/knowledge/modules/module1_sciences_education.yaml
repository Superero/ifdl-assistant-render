objectif_general: |
  Acquérir les fondements théoriques des sciences de l'éducation pour les
  mobiliser dans la conception de formations numériques adaptées aux adultes.

# ── OBJECTIFS SPÉCIFIQUES ─────────────────────────────────
objectifs_specifiques: |
  À l'issue de ce module, l'étudiant sera capable de :
  1. Distinguer et comparer les grandes théories de l'apprentissage
     (béhaviorisme, cognitivisme, constructivisme, connectivisme).
  2. Appliquer les principes de l'andragogie à la conception de formations
     pour adultes.
  3. Analyser une situation d'apprentissage à travers les grilles théoriques
     appropriées.
  4. Mobiliser la taxonomie de Bloom pour rédiger des objectifs pédagogiques
     opérationnels.
  5. Identifier les leviers motivationnels pour favoriser l'engagement des
     apprenants adultes.

# ── PLAN DU MODULE / CHAPITRES ────────────────────────────
chapitres: |
  CHAPITRE 1 : LES GRANDES THÉORIES DE L'APPRENTISSAGE

  1.1 Le Béhaviorisme (Watson, Pavlov, Skinner)
  - Principes : apprentissage = modification observable du comportement par
    stimulation-réponse (S-R).
  - Conditionnement classique (Pavlov) : association stimulus neutre/stimulus
    inconditionnel → réponse conditionnelle.
  - Conditionnement opérant (Skinner) : renforcement positif (récompense),
    négatif (suppression d'un élément désagréable), punition.
  - Applications en e-learning : quiz avec feedback immédiat, exercices
    répétitifs, systèmes de points et badges (gamification).
  - Limites : ne rend pas compte des processus mentaux internes.

  1.2 Le Cognitivisme (Piaget, Bruner, Ausubel, Gagné)
  - Principes : apprentissage = traitement de l'information et construction de
    schémas mentaux.
  - Mémoire sensorielle → mémoire de travail (capacité limitée : 7 ± 2
    éléments, Miller, 1956) → mémoire à long terme.
  - Théorie de la charge cognitive (Sweller) :
    · Charge intrinsèque : complexité inhérente du contenu.
    · Charge extrinsèque : due à une mauvaise conception pédagogique.
    · Charge pertinente : effort cognitif utile à l'apprentissage.
  - Applications : segmenter l'information, utiliser des organisateurs
    avancés, cartes conceptuelles, exemples avant la règle.

  1.3 Le Constructivisme (Piaget, Vygotski)
  - Piaget : l'apprenant construit activement ses connaissances par
    assimilation et accommodation. Stades de développement cognitif.
  - Vygotski : Zone Proximale de Développement (ZPD) = écart entre ce que
    l'apprenant peut faire seul et ce qu'il peut faire avec aide.
  - Scaffolding (étayage) : soutien progressivement retiré à mesure que
    l'apprenant gagne en autonomie.
  - Applications e-learning : situations-problèmes, apprentissage par projet,
    études de cas, forums de discussion.

  1.4 Le Socioconstructivisme (Vygotski, Bruner)
  - L'apprentissage est fondamentalement social : se construit dans
    l'interaction avec les pairs et les formateurs.
  - Apprentissage collaboratif vs coopératif.
  - Applications : wikis collaboratifs, travaux de groupe en ligne,
    peer-learning, forums.

  1.5 Le Connectivisme (Siemens & Downes, 2005)
  - Théorie de l'apprentissage à l'ère numérique.
  - Apprendre = créer et naviguer dans des réseaux de connexions entre nœuds
    d'information (personnes, bases de données, outils).
  - La connaissance peut résider en dehors de l'individu.
  - Applications : PLN (Personal Learning Network), curation, MOOCs,
    réseaux sociaux académiques.

  CHAPITRE 2 : ANDRAGOGIE ET APPRENTISSAGE DES ADULTES

  2.1 Les 6 principes de l'andragogie (Knowles)
  1. Besoin de savoir : l'adulte a besoin de comprendre POURQUOI il apprend.
  2. Concept de soi : l'adulte est autonome et auto-dirigé.
  3. Rôle de l'expérience : l'expérience passée est une ressource majeure.
  4. Disposition à apprendre : liée à des besoins réels de la vie/travail.
  5. Orientation de l'apprentissage : centré sur des problèmes pratiques.
  6. Motivation : essentiellement intrinsèque (évolution, accomplissement).

  2.2 Différences apprenant adulte / enfant
  - L'adulte apprend mieux quand il voit l'utilité immédiate.
  - L'adulte apporte de l'expérience qu'il faut valoriser.
  - L'adulte est souvent contraint par le temps (vie pro/perso).
  - L'adulte peut résister au changement de pratiques établies.

  CHAPITRE 3 : MOTIVATION ET ENGAGEMENT

  3.1 Théorie de l'autodétermination (Deci & Ryan, 1985)
  - Motivation intrinsèque : plaisir, curiosité, accomplissement.
  - Motivation extrinsèque : récompenses, diplôme, promotion.
  - Besoins fondamentaux : compétence, autonomie, appartenance sociale.

  3.2 Le modèle ARCS (Keller, 1987) — Attention, Relevance, Confidence,
  Satisfaction
  - Attention : capter et maintenir l'intérêt.
  - Relevance : pertinence pour les besoins de l'apprenant.
  - Confidence : sentiment de pouvoir réussir.
  - Satisfaction : valeur et plaisir de l'apprentissage.

  3.3 Flux (Flow) de Csikszentmihalyi
  - État optimal d'engagement quand le défi équilibre les compétences.
  - Application : calibrer la difficulté des activités pour éviter
    l'ennui (trop facile) ou l'anxiété (trop difficile).

  CHAPITRE 4 : TAXONOMIE DE BLOOM ET OBJECTIFS PÉDAGOGIQUES

  4.1 Taxonomie de Bloom révisée (Anderson & Krathwohl, 2001)
  Niveaux cognitifs (du plus simple au plus complexe) :
  1. MÉMORISER : reconnaître, rappeler (ex : définir, lister, nommer)
  2. COMPRENDRE : expliquer, paraphraser (ex : décrire, résumer, expliquer)
  3. APPLIQUER : utiliser dans un nouveau contexte (ex : calculer, construire)
  4. ANALYSER : décomposer, comparer (ex : distinguer, comparer, critiquer)
  5. ÉVALUER : porter un jugement (ex : justifier, argumenter, évaluer)
  6. CRÉER : produire quelque chose de nouveau (ex : concevoir, produire)

  4.2 Rédaction d'un objectif pédagogique opérationnel (méthode SMART)
  Structure : "À l'issue de [séquence], l'apprenant sera capable de [verbe
  d'action observable] [objet] [condition] [critère de réussite]."
  Exemple : "À l'issue du module 1, l'apprenant sera capable de comparer
  les 5 théories de l'apprentissage en identifiant au moins 3 caractéristiques
  distinctives de chacune, dans un tableau synthétique."

