conseils: |
  - Explorez Moodle en tant qu'apprenant ET en tant que futur concepteur :
    notez ce qui fonctionne bien ou mal pédagogiquement.
  - Commencez à utiliser H5P sur la plateforme dès la semaine 2 : c'est
    l'outil le plus accessible pour créer des activités interactives.
  - Suivez quelques MOOCs gratuits sur Coursera ou FUN-MOOC pour observer
    les bonnes pratiques du digital learning par l'expérience.
  - Créez-vous un compte sur openrouter.ai ou Quizgecko pour tester les
    outils IA présentés dans le cours.